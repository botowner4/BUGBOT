<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUGBOT Pairing UI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
  background:black;
  height:100vh;
  overflow:hidden;
}

/* CARD */
.card{
  width:100%;
  height:100vh;
  position:relative;
  background:linear-gradient(135deg,#2b1055,#7597de);
  overflow:hidden;
}

/* GLOW */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 30% 30%, #ff4d4d, transparent 40%),
             radial-gradient(circle at 70% 70%, #33ccff, transparent 40%);
  filter:blur(100px);
  opacity:0.3;
}

/* PARTICLES */
.particle{
  position:absolute;
  border-radius:50%;
  opacity:0.6;
  animation:float 10s infinite;
}
@keyframes float{
  50%{transform:translateY(-120px);}
}

/* STATUS */
.status{
  position:absolute;
  top:8px;
  width:95%;
  left:2.5%;
  display:flex;
  justify-content:space-between;
  color:white;
  font-size:13px;
}

/* CONTENT */
.content{
  position:absolute;
  top:48%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:380px;
  text-align:center;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
.user{
  display:flex;
  gap:10px;
  align-items:center;
}
.user img{
  width:40px;
  border-radius:50%;
}
.username{
  color:orange;
  font-weight:bold;
}
.battery{
  background:#00ff66;
  color:black;
  padding:4px 10px;
  border-radius:20px;
}

/* TITLE */
.title{
  font-size:28px;
  margin:10px 0;
  background:linear-gradient(90deg,orange,yellow,green);
  -webkit-background-clip:text;
  color:transparent;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:8px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,orange,green);
  color:white;
  font-weight:bold;
}

/* CODE BOX */
.code-box{
  margin-top:10px;
  padding:10px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  font-size:16px;
}

/* COPY BUTTON */
.copy{
  margin-top:5px;
  background:#00ff66;
  color:black;
  padding:8px;
  border-radius:20px;
  cursor:pointer;
}

/* MUSIC */
.music{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 20px;
  border-radius:25px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card" id="card">

  <!-- STATUS -->
  <div class="status">
    <span id="time"></span>
    <span id="speed">2.3 k/s 📶 WiFi 🔋92%</span>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="header">
      <div class="user">
        <img src="https://i.imgur.com/6VBx3io.png">
        <div class="username">bugfixed sulexh tech</div>
      </div>
      <div class="battery">100%</div>
    </div>

    <div class="title">PAIRING CODE</div>

    <input id="number" placeholder="+2547XXXXXXX">

    <button onclick="generate()">GENERATE</button>

    <!-- GENERATED CODE -->
    <div id="result"></div>

  </div>

  <!-- MUSIC -->
  <div class="music" onclick="toggleMusic()" id="musicBtn">
    ⏸ Music
  </div>

</div>

<audio id="music" loop autoplay>
  <source src="https://files.catbox.moe/s8tp1b.mp3">
</audio>

<script>

/* TIME */
setInterval(()=>{
  let now = new Date();
  document.getElementById("time").innerText =
    now.getHours()+":"+now.getMinutes().toString().padStart(2,'0');
},1000);

/* NETWORK SPEED */
setInterval(()=>{
  let speed = (Math.random()*5+1).toFixed(1);
  document.getElementById("speed").innerText =
    speed+" k/s 📶 WiFi 🔋92%";
},1500);

/* GENERATE */
function generate(){
  let num = document.getElementById("number").value;
  if(!num){
    alert("Enter number");
    return;
  }

  let code = "PAIR-" + Math.floor(Math.random()*999999);

  document.getElementById("result").innerHTML = `
    <div class="code-box">${code}</div>
    <div class="copy" onclick="copyCode('${code}')">COPY</div>
  `;
}

/* COPY */
function copyCode(code){
  navigator.clipboard.writeText(code);
  alert("Copied: " + code);
}

/* MUSIC */
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");

window.addEventListener("load", ()=>{
  music.volume=0.4;
  music.play().catch(()=>{
    document.body.addEventListener("click", ()=>{
      music.play();
    },{once:true});
  });
});

function toggleMusic(){
  if(music.paused){
    music.play();
    btn.innerText="⏸ Music";
  }else{
    music.pause();
    btn.innerText="▶ Music";
  }
}

/* PARTICLES */
let card = document.getElementById("card");
for(let i=0;i<30;i++){
  let p=document.createElement("div");
  p.className="particle";
  let s=Math.random()*5+3;
  p.style.width=p.style.height=s+"px";
  p.style.background=`rgba(${Math.random()*255},${Math.random()*255},255,0.7)`;
  p.style.left=Math.random()*100+"%";
  p.style.top=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  card.appendChild(p);
}
</script>

</body>
</html>
