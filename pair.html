<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUGBOT WEBSITE UI</title>

<style>
body{
  margin:0;
  background:#0b141a;
  font-family:Arial, sans-serif;
  color:#e9edef;
}

/* STATUS */
.status{
  display:flex;
  justify-content:space-between;
  padding:6px 12px;
  font-size:13px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:10px 12px;
}
.header-left{
  display:flex;
  gap:10px;
}
.sub{font-size:12px;color:#8696a0;}

/* CARD */
.card{
  margin:10px;
  background:#111b21;
  border-radius:8px;
  overflow:hidden;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:12px;
}
.top-left{
  display:flex;
  gap:10px;
  align-items:center;
}
.avatar{
  width:40px;height:40px;border-radius:50%;background:#25d366;
}
.username{
  color:#f0b429;
  font-weight:600;
}
.battery{
  background:#25d366;
  color:black;
  padding:5px 12px;
  border-radius:20px;
}

/* CONTENT */
.content{
  padding:20px;
  text-align:center;
  background:linear-gradient(135deg,#0a0f2c,#0f2a44);
  position:relative;
  overflow:hidden;
}

/* BLUR OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.3);
  transition:0.3s;
}

/* PLAY BUTTON */
.play{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.6);
  padding:18px;
  border-radius:50%;
  font-size:28px;
  cursor:pointer;
  z-index:2;
}

/* INPUT */
input{
  width:90%;
  padding:14px;
  border:none;
  border-radius:8px;
  margin:15px 0;
}

/* BUTTON */
button{
  width:90%;
  padding:14px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,#ff9900,#00cc33);
  color:white;
}

/* CAPTION */
.caption{
  padding:12px;
  color:#8696a0;
}

/* PROGRESS */
.progress{
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 12px 12px;
  font-size:13px;
}
.bar{
  flex:1;
  height:4px;
  background:#2a3942;
  position:relative;
  cursor:pointer;
}
.fill{
  height:100%;
  width:0%;
  background:#25d366;
}

/* SPEED */
.speed{
  cursor:pointer;
}
</style>
</head>

<body>

<div class="status">
  <span id="time">15:14</span>
  <span>▂▃▅ ▂▃▅ 🔋14%</span>
</div>

<div class="header">
  <div class="header-left">
    ←
    <div>
      <div>You</div>
      <div class="sub">Today, 11:32</div>
    </div>
  </div>
  <div>⭐ ⋮</div>
</div>

<div class="card">

  <div class="top">
    <div class="top-left">
      <div class="avatar"></div>
      <div class="username">BUGFIXED SULEXH TECH</div>
    </div>
    <div class="battery">100%</div>
  </div>

  <div class="content" onclick="togglePlay()">

    <div class="overlay" id="overlay"></div>

    <div class="play" id="playBtn">▶</div>

    <h2>PAIRING CODE</h2>

    <input placeholder="+2547XXXXXXX">
    <button>GENERATE</button>

  </div>

  <div class="progress">
    <span id="current">00:00</span>
    <div class="bar" onclick="seek(event)">
      <div class="fill" id="fill"></div>
    </div>
    <span id="duration">00:57</span>
    <span class="speed" onclick="changeSpeed()" id="speed">1.0x</span>
  </div>

</div>

<audio id="music">
  <source src="https://files.catbox.moe/s8tp1b.mp3">
</audio>

<script>
let music = document.getElementById("music");
let fill = document.getElementById("fill");
let current = document.getElementById("current");
let playBtn = document.getElementById("playBtn");
let overlay = document.getElementById("overlay");
let speedText = document.getElementById("speed");

let speeds = [1,1.5,2];
let speedIndex = 0;

/* TIME */
setInterval(()=>{
  let now = new Date();
  document.getElementById("time").innerText =
    now.getHours()+":"+now.getMinutes().toString().padStart(2,'0');
},1000);

/* PLAY */
function togglePlay(){
  if(music.paused){
    music.play();
    playBtn.innerText="⏸";
    overlay.style.opacity="0";
  }else{
    music.pause();
    playBtn.innerText="▶";
    overlay.style.opacity="1";
  }
}

/* PROGRESS */
music.ontimeupdate = ()=>{
  let percent = (music.currentTime / music.duration) * 100;
  fill.style.width = percent + "%";

  let m = Math.floor(music.currentTime/60);
  let s = Math.floor(music.currentTime%60);
  current.innerText = m + ":" + s.toString().padStart(2,'0');
};

/* SEEK */
function seek(e){
  let rect = e.target.getBoundingClientRect();
  let percent = (e.clientX - rect.left) / rect.width;
  music.currentTime = percent * music.duration;
}

/* SPEED */
function changeSpeed(){
  speedIndex = (speedIndex+1)%speeds.length;
  music.playbackRate = speeds[speedIndex];
  speedText.innerText = speeds[speedIndex] + "x";
}
</script>

</body>
</html>
