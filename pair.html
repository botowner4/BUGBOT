<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pair Code</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      width: 300px;
      height: 320px;
      padding: 20px;
      position: relative;
      text-align: center;
      background-color: rgb(0, 0, 0);
      border-radius: 10px;
      transform: perspective(1000px) rotateY(0deg);
      box-shadow: 0 0 20px rgba(250, 249, 249, 0.7);
      position: relative;
    }

    #text { color: #f6f5f5; }
    .input-container input { color: #f1eaea; }
    .centered-text { color: #e9e4e4; text-align:center; }

    .input-container {
      display: flex;
      background: black;
      border-radius: 1rem;
      padding: 0.3rem;
      gap: 0.3rem;
      max-width: 300px;
      width: 100%;
    }

    .input-container input {
      border-radius: 0.8rem 0 0 0.8rem;
      background: #e8e8e8;
      box-shadow: inset 13px 13px 10px #dcdcdc, inset -13px -13px 10px #f4f4f4;
      width: 100%;
      flex-basis: 75%;
      padding: 1rem;
      border: none;
      color: #000;
    }

    .input-container button {
      flex-basis: 15%;
      padding: 1rem;
      background: #5935ac;
      font-weight: 700;
      color: white;
      border: none;
      border-radius: 0 1rem 1rem 0;
    }

    /* MUSIC BUTTON (BOTTOM ONLY) */
    .music-btn{
      position:fixed;
      bottom:15px;
      left:50%;
      transform:translateX(-50%);
      background:#111;
      color:white;
      padding:10px 20px;
      border-radius:25px;
      border:1px solid #333;
      cursor:pointer;
      z-index:999;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="main">
      <div class="box" id="box">
        <div id="text">
          <i class="fa fa-user"></i>
          <h3 class="centered-text">BUGBOT PAIRING CODE</h3>
          <br>
          <h6>Made By Bugfixed Sulexh tech🔥🥳.</h6>
          <h6>Enter Your Number with Country Code.</h6>

          <div class="input-container">
            <input placeholder="2547xxxxxx" type="number" id="number">
            <button id="submit">Submit</button>
          </div>

          <a id="waiting-message" class="centered-text" style="display: none;">Please wait a while</a>
          <br><br>
          <main id="pair"></main>

        </div>
      </div>
    </div>
  </div>

  <!-- 🎵 MUSIC -->
  <audio id="bgMusic" loop autoplay>
    <source src="https://files.catbox.moe/s8tp1b.mp3" type="audio/mpeg">
  </audio>

  <!-- 🎵 BUTTON -->
  <div class="music-btn" id="musicBtn">⏸ Music</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let text = document.getElementById("copy").innerText;
      let obj = document.getElementById("copy");
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      obj.innerText = "COPIED";
      obj.style = "color:blue;font-weight:bold";
      setTimeout(() => {
        obj.innerText = text;
        obj.style = "color:white;font-weight-bold";
      }, 500);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<a style="color:white;font-weight:bold">Enter your WhatsApp number with Country Code</a><br><br>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<a style="color:red;font-weight:bold">Invalid Number</a><br><br>';
      } else {
        const Venocyber_Tech = c.value.replace(/[^0-9]/g, "");
        a.innerHTML = '<a style="color:white;font-weight:bold">Please Wait...</a><br><br>';
        let { data } = await axios(`/code?number=${Venocyber_Tech}`);
        let code = data.code || "Service Unavailable";
        a.innerHTML = '<font id="copy" onclick="Copy()" style="color:red;font-weight:bold" size="5">CODE: <span style="color:white;font-weight:bold">' + code + '</span></font><br><br><br>';
      }
    });

    /* 🎵 MUSIC CONTROL */
    let music = document.getElementById("bgMusic");
    let btn = document.getElementById("musicBtn");

    window.addEventListener("load", ()=>{
      music.volume = 0.4;
      let p = music.play();
      if(p !== undefined){
        p.catch(()=>{
          document.body.addEventListener("click", ()=>{
            music.play().catch(()=>{});
          },{once:true});
        });
      }
    });

    btn.onclick = ()=>{
      if(music.paused){
        music.play();
        btn.innerText="⏸ Music";
      }else{
        music.pause();
        btn.innerText="▶ Music";
      }
    };
  </script>

</body>
</html>
